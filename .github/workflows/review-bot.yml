name: SIP Reviewer Bot

on:
  pull_request_target:
    branches: [ main ]
    paths:
      - '**/SKILL.md'
      - 'scripts/sip-validator.js'

permissions:
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Base (Scripts)
        uses: actions/checkout@v4

      - name: Checkout Head (Skills)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          path: pr_content

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run SIP Validator
        id: validator
        run: |
          # Fetch base to compare
          git fetch origin main

          # Get changed skills from the PR
          # Note: we are in the base repo, but we want to know what changed in the PR
          # We use the PR context to find changed files
          CHANGED_FILES=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" ${{ github.event.pull_request.url }}/files | jq -r '.[].filename' | grep "SKILL.md" || true)
          
          if [ -z "$CHANGED_FILES" ]; then
            echo "No skill changes detected."
            echo "REPORT=No skills changed." >> $GITHUB_OUTPUT
            exit 0
          fi

          REPORT=""
          # Extract unique directories
          DIRS=$(echo "$CHANGED_FILES" | xargs -I {} dirname {} | sort -u)
          
          for dir in $DIRS; do
            echo "Validating $dir..."
            # Run the trusted validator from main on the untrusted PR content
            OUT=$(node scripts/sip-validator.js "pr_content/$dir") || true
            # Clean up the output path to look normal in the comment
            OUT=$(echo -e "$OUT" | sed "s|pr_content/||g")
            REPORT="$REPORT\n$OUT"
            
            # Run AI Reviewer
            echo "Running AI Reviewer on $dir..."
            AI_OUT=$(node scripts/ai-reviewer.js "pr_content/$dir") || true
            if [ -n "$AI_OUT" ]; then
              AI_OUT=$(echo -e "$AI_OUT" | sed "s|pr_content/||g")
              REPORT="$REPORT\n\n$AI_OUT"
            fi
          done
          
          # Clean up for GH output (escape newlines)
          echo "REPORT<<EOF" >> $GITHUB_OUTPUT
          echo -e "$REPORT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Comment on PR
        if: steps.validator.outputs.REPORT != ''
        uses: actions/github-script@v7
        with:
          script: |
            const report = process.env.REPORT;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "## SIP Validation Results\n" + report
            })
        env:
          REPORT: ${{ steps.validator.outputs.REPORT }}

